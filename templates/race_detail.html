<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Results - F1 Points Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root {
            --f1-red: #e10600;
            --f1-dark: #1e1e1e;
            --f1-gold: #ffd700;
            --f1-silver: #c0c0c0;
            --f1-bronze: #cd7f32;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            position: relative;
        }

        .main-container {
            background: rgba(30, 30, 30, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(225, 6, 0, 0.2);
            margin-top: 2rem;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, var(--f1-red), #ff4444);
            color: white;
            padding: 2rem;
            border-bottom: 3px solid var(--f1-gold);
        }

        .card {
            background: rgba(40, 40, 40, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            margin-bottom: 1.5rem;
        }

        .table {
            color: white;
        }

        .table thead th {
            background: rgba(60, 60, 60, 0.9);
            border-bottom: 2px solid var(--f1-red);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .position-1 { border-left: 4px solid var(--f1-gold); background: rgba(255, 215, 0, 0.1) !important; }
        .position-2 { border-left: 4px solid var(--f1-silver); background: rgba(192, 192, 192, 0.1) !important; }
        .position-3 { border-left: 4px solid var(--f1-bronze); background: rgba(205, 127, 50, 0.1) !important; }

        .btn-outline-light {
            border-radius: 20px;
            padding: 0.5rem 1.5rem;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 600;
        }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="loadingOverlay">
        <div class="spinner-border text-danger" role="status"></div>
        <p class="mt-3">Loading race results...</p>
    </div>

    <div class="container">
        <div class="main-container">
            <div class="header d-flex justify-content-between align-items-center">
                <div>
                    <h1 id="raceTitle" class="mb-0">Race Results</h1>
                    <p id="raceSubtitle" class="mb-0 opacity-75">Loading details...</p>
                </div>
                <button class="btn btn-outline-light" onclick="window.close()">
                    <i class="fas fa-times me-2"></i> Close
                </button>
            </div>

            <div class="p-4">
                <div class="row">
                    <div class="col-lg-8">
                        <div class="card p-3">
                            <h4 class="mb-3"><i class="fas fa-list-ol me-2 text-danger"></i> Classification</h4>
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>Pos</th>
                                            <th>Driver</th>
                                            <th>Constructor</th>
                                            <th>Laps</th>
                                            <th>Time/Gap</th>
                                            <th>Grid</th>
                                            <th>Pts</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody id="resultsBody">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="card p-3">
                            <h4 class="mb-3"><i class="fas fa-chart-bar me-2 text-danger"></i> Finish Analysis</h4>
                            <div id="finishChart"></div>
                        </div>
                        <div class="card p-3">
                            <h4 class="mb-3"><i class="fas fa-info-circle me-2 text-danger"></i> Race Info</h4>
                            <div id="raceMetadata">
                                <p><strong>Date:</strong> <span id="metaDate">-</span></p>
                                <p><strong>Round:</strong> <span id="metaRound">-</span></p>
                                <p><strong>Total Finishers:</strong> <span id="metaFinishers">-</span></p>
                                <p><strong>DNFs:</strong> <span id="metaDNFs">-</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const raceId = params.get('race');
        const season = params.get('season');

        async function init() {
            if (!raceId) {
                document.getElementById('raceTitle').textContent = "Error";
                document.getElementById('raceSubtitle').textContent = "No race ID provided";
                document.getElementById('loadingOverlay').style.display = 'none';
                return;
            }

            try {
                // Fetch full race detail using the race-results API
                const resp = await fetch('/api/race-results', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ season_year: parseInt(season) || null, race_id: parseInt(raceId) })
                });
                if (!resp.ok) throw new Error("Failed to fetch race details");
                const data = await resp.json();

                // Update Header
                // API returns `results` and may include `race_name`/`round` fields
                document.getElementById('raceTitle').textContent = data.race_name || ('Race ' + raceId);
                document.getElementById('raceSubtitle').textContent = `${season || ''} Formula 1 Season`;

                // Update Metadata
                document.getElementById('metaDate').textContent = data.date || data.race_date || 'N/A';
                document.getElementById('metaRound').textContent = data.round || 'N/A';

                const results = data.results || [];
                // A driver is considered a finisher only if `position` is present (not null) and laps > 0
                const finishers = results.filter(r => r.position && r.laps > 0).length;
                const dnfs = results.length - finishers;
                document.getElementById('metaFinishers').textContent = finishers;
                document.getElementById('metaDNFs').textContent = dnfs;

                // Populate Table
                const body = document.getElementById('resultsBody');
                results.forEach((r, idx) => {
                    const row = document.createElement('tr');
                    if (idx === 0) row.className = 'position-1';
                    else if (idx === 1) row.className = 'position-2';
                    else if (idx === 2) row.className = 'position-3';

                    // Use API response fields: `position`, `driver` (string), `constructor` or `constructor_name`, `final_time`, etc.
                    const timeStr = r.final_time ? `${r.final_time}` : (idx === 0 && r.laps > 0 ? 'WINNER' : '-');
                    // split driver into names if available
                    let forename = r.forename || '';
                    let surname = r.surname || '';
                    if ((!forename || !surname) && r.driver) {
                        const parts = r.driver.split(' ');
                        forename = parts.slice(0, -1).join(' ');
                        surname = parts.slice(-1).join(' ');
                    }

                    row.innerHTML = `
                        <td><strong>${r.position || 'DNF'}</strong></td>
                        <td>${forename} ${surname}</td>
                        <td>${r.constructor_name || r.constructor || ''}</td>
                        <td>${r.laps || 0}</td>
                        <td>${timeStr}</td>
                        <td>${r.grid || '-'}</td>
                        <td>${r.points || 0}</td>
                        <td><span class="badge ${r.position ? 'bg-success' : 'bg-danger'}">${r.position ? 'Finished' : (r.status || 'DNF')}</span></td>
                    `;
                    body.appendChild(row);
                });

                // Create Chart
                const chartData = results
                    .filter(r => r.positionOrder)
                    .map(r => ({
                        name: `${r.forename[0]}. ${r.surname}`,
                        pos: r.positionOrder
                    }))
                    .reverse();

                const trace = {
                    y: chartData.map(d => d.name),
                    x: chartData.map(d => d.pos),
                    type: 'bar',
                    orientation: 'h',
                    marker: {
                        color: 'rgba(225, 6, 0, 0.7)',
                        line: { color: 'rgba(225, 6, 0, 1.0)', width: 1 }
                    }
                };

                const layout = {
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    font: { color: '#ffffff' },
                    margin: { l: 100, r: 20, t: 20, b: 40 },
                    xaxis: { title: 'Finishing Position', autorange: 'reversed' },
                    height: 500
                };

                Plotly.newPlot('finishChart', [trace], layout);

            } catch (err) {
                console.error(err);
                alert("Error loading race results");
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        init();
    </script>
</body>
</html>
